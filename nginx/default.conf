server {
    listen 80;
    server_name semillero-dev.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name semillero-dev.duckdns.org;

    # Estas rutas se habilitarán una vez corras el comando de certbot por primera vez
    ssl_certificate /etc/letsencrypt/live/semillero-dev.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/semillero-dev.duckdns.org/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}