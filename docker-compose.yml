services:
  backend:
    build: 
      context: ./HTTP
    command: sh -c "python manage.py migrate && gunicorn semillero_backend.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080"
    volumes:
      - ./HTTP:/app
    container_name: semillero_backend
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - db_semillero
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
      - SECRET_KEY=dev_secret_key_change_in_production
    networks:
      - semillero-net

  redis:
    image: redis:7
    container_name: semillero_redis
    ports:
      - "6379:6379"
    networks:
      - semillero-net

  db_semillero:
    image: postgres:17-alpine
    container_name: semillero_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - semillero-net

networks:
  semillero-net:
    external: true

volumes:
  postgres_data: